# render.yaml — Render Blueprint for ContractShield Backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: contractshield-backend
    runtime: python
    pythonVersion: "3.11.9"      # ← PIN Python 3.11 — spacy 3.7.2 has no wheels for 3.14
    region: singapore             # closest to India
    plan: free

    # ── Build ──────────────────────────────────────────────────────────────────
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # ── Start ──────────────────────────────────────────────────────────────────
    # eventlet worker is required for Flask-SocketIO
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 wsgi:app

    # ── Health check ───────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment variables ─────────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION       # belt-and-suspenders: also set as env var
        value: "3.11.9"

      - key: FLASK_ENV
        value: production

      - key: FLASK_APP
        value: run.py

      - key: SPACY_MODEL
        value: en_core_web_sm

      - key: MAX_CONTENT_LENGTH
        value: "16777216"

      - key: GROQ_API_URL
        value: https://api.groq.com/openai/v1/chat/completions

      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: DEBUG
        value: "False"

      - key: TESTING
        value: "False"

      # ⚠️  Set these in Render Dashboard → Environment:
      # DATABASE_URL   → your Supabase PostgreSQL connection string
      # SECRET_KEY     → python -c "import secrets; print(secrets.token_hex(32))"
      # JWT_SECRET_KEY → python -c "import secrets; print(secrets.token_hex(32))"
      # GROQ_API_KEY   → from console.groq.com
      # CORS_ORIGINS   → https://your-app.vercel.app
